name = "holdmyresume-backend"
main = "src/index.ts"
compatibility_date = "2024-06-11"

[vars]
JWT_SECRET = "super-secret-local-development-key-1234567890"

[[kv_namespaces]]
binding = "LIMITER_KV"
id = "local-limiter-kv"

[[d1_databases]]
binding = "DB"
database_name = "holdmyresume-db"
database_id = "local-holdmyresume-db"
migrations_dir = "migrations"

[ai]
binding = "AI"
